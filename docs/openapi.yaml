openapi: 3.1.0
info:
  title: Hydrozoa node API
  version: 0.1.0
paths:
  /api/l2/submit:
    post:
      description: Submit a signed L2 transaction (a JSON UserRequest with a COSE
        signature).
      operationId: postApiL2Submit
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/deposit/register:
    post:
      description: Register an L1 deposit (a JSON UserRequest with a COSE signature).
      operationId: postApiDepositRegister
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/head-info:
    get:
      description: Head parameters plus the current node time.
      operationId: getApiHead-info
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadInfoResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/l2/utxos/{address}:
    get:
      description: Current L2 utxos controlled by a bech32 address (EUTXO ledger only;
        empty otherwise).
      operationId: getApiL2UtxosAddress
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2UtxoView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/l2/transactions:
    get:
      description: Recent applied L2 transactions, newest first (EUTXO ledger only;
        empty otherwise).
      operationId: getApiL2Transactions
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2TxSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      description: Liveness — always 200 while the process is serving HTTP.
      operationId: getHealth
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/admin/finalize:
    post:
      description: Trigger head finalization (admin only).
      operationId: postApiAdminFinalize
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        default:
          description: ''
          headers:
            WWW-Authenticate:
              required: false
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - {}
      - httpAuth: []
components:
  schemas:
    DatumView:
      title: DatumView
      type: object
      properties:
        inline:
          type: string
        hash:
          type: string
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    FinalizeResponse:
      title: FinalizeResponse
      type: object
      required:
      - status
      - message
      properties:
        status:
          type: string
        message:
          type: string
    HeadInfoResponse:
      title: HeadInfoResponse
      type: object
      required:
      - headId
      - headAddress
      - multisigRegimeUtxo
      - treasuryBeaconToken
      - submissionDurationSeconds
      - absorptionStartOffsetSeconds
      - refundStartOffsetSeconds
      - currentTimePosixSeconds
      - maxNonPlutusTxFee
      properties:
        headId:
          type: string
        headAddress:
          type: string
        multisigRegimeUtxo:
          $ref: '#/components/schemas/TxInputView'
        treasuryBeaconToken:
          type: string
        submissionDurationSeconds:
          type: integer
          format: int64
        absorptionStartOffsetSeconds:
          type: integer
          format: int64
        refundStartOffsetSeconds:
          type: integer
          format: int64
        currentTimePosixSeconds:
          type: integer
          format: int64
        maxNonPlutusTxFee:
          type: string
    HealthResponse:
      title: HealthResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    L2OutputView:
      title: L2OutputView
      type: object
      required:
      - address
      - value
      properties:
        address:
          type: string
        value:
          $ref: '#/components/schemas/ValueView'
        datum:
          $ref: '#/components/schemas/DatumView'
    L2TxSummaryView:
      title: L2TxSummaryView
      type: object
      required:
      - requestId
      - blockNumber
      - kind
      properties:
        requestId:
          $ref: '#/components/schemas/RequestIdView'
        blockNumber:
          type: integer
          format: int32
        kind:
          type: string
    L2UtxoView:
      title: L2UtxoView
      type: object
      required:
      - input
      - output
      properties:
        input:
          $ref: '#/components/schemas/TxInputView'
        output:
          $ref: '#/components/schemas/L2OutputView'
    Map_Map_String_String:
      title: Map_Map_String_String
      type: object
      additionalProperties:
        $ref: '#/components/schemas/Map_String'
    Map_String:
      title: Map_String
      type: object
      additionalProperties:
        type: string
    RequestAcceptedResponse:
      title: RequestAcceptedResponse
      type: object
      required:
      - requestId
      properties:
        requestId:
          type: integer
          format: int64
    RequestIdView:
      title: RequestIdView
      type: object
      required:
      - headPeerNumber
      - requestNumber
      properties:
        headPeerNumber:
          type: integer
          format: int32
        requestNumber:
          type: integer
          format: int64
    TxInputView:
      title: TxInputView
      type: object
      required:
      - transaction_id
      - index
      properties:
        transaction_id:
          type: string
        index:
          type: integer
          format: int32
    ValueView:
      title: ValueView
      type: object
      required:
      - coin
      - assets
      properties:
        coin:
          type: string
        assets:
          $ref: '#/components/schemas/Map_Map_String_String'
  securitySchemes:
    httpAuth:
      type: http
      scheme: basic
