openapi: 3.1.0
info:
  title: Hydrozoa node API
  version: 0.1.0
paths:
  /api/l2/submit:
    post:
      description: Submit an L2 transaction (a JSON UserRequest whose L2 payload is
        a native, self-authenticating Cardano transaction).
      operationId: postApiL2Submit
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/deposit/register:
    post:
      description: Register an L1 deposit (a JSON UserRequest whose L2 payload is
        a native, self-authenticating Cardano transaction).
      operationId: postApiDepositRegister
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/head-info:
    get:
      description: Head parameters plus the current node time.
      operationId: getApiHead-info
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadInfoResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/requests:
    get:
      description: Every request the head has assigned an id, across all head peers
        — request id (author peer number + request number) and type (transaction or
        deposit).
      operationId: getHeadRequests
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/requests/{head-peer-number}:
    get:
      description: Every request authored by one head peer, in request-number order
        — request number and type.
      operationId: getHeadPeerRequests
      parameters:
      - name: head-peer-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PeerRequestSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/requests/{head-peer-number}/{request-number}:
    get:
      description: 'One request''s type, receive time, and lifecycle status: UNPROCESSED,
        LOCALLY_PROCESSED (block + validity), SOFT_CONFIRMED (+ this node''s soft-confirmation
        time), or HARD_CONFIRMED (+ its hard-confirmation time).'
      operationId: getHeadRequest
      parameters:
      - name: head-peer-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: request-number
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetailsView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks:
    get:
      description: Every block of the head in block order — number, fast-cycle leader,
        and type. Block 0 is the head's initial block (config, no leader).
      operationId: getHeadBlocks
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}:
    get:
      description: 'One block''s type, leader, and confirmation status: PROPOSED,
        SOFT (with this node''s soft-confirmation time), or HARD (plus its hard-confirmation
        time).'
      operationId: getHeadBlock
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetailsView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/header:
    get:
      description: The block's header content. The shape varies by block type (initial,
        minor, major, final).
      operationId: getHeadBlockHeader
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema: {}
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      description: Liveness — always 200 while the process is serving HTTP.
      operationId: getHealth
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      description: Readiness — 200 only while the head is Active (open on L1); 503
        with the lifecycle status otherwise.
      operationId: getReady
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/admin/finalize:
    post:
      description: Trigger head finalization (admin only).
      operationId: postApiAdminFinalize
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        default:
          description: ''
          headers:
            WWW-Authenticate:
              required: false
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - {}
      - httpAuth: []
components:
  schemas:
    BlockConfirmationView:
      title: BlockConfirmationView
      type: object
      required:
      - status
      properties:
        status:
          type: string
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
    BlockDetailsView:
      title: BlockDetailsView
      type: object
      required:
      - number
      - blockType
      - confirmation
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
        confirmation:
          $ref: '#/components/schemas/BlockConfirmationView'
    BlockSummaryView:
      title: BlockSummaryView
      type: object
      required:
      - number
      - blockType
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    FinalizeResponse:
      title: FinalizeResponse
      type: object
      required:
      - status
      - message
      properties:
        status:
          type: string
        message:
          type: string
    HeadInfoResponse:
      title: HeadInfoResponse
      type: object
      required:
      - headId
      - headAddress
      - multisigRegimeUtxo
      - treasuryBeaconToken
      - submissionDurationSeconds
      - absorptionStartOffsetSeconds
      - refundStartOffsetSeconds
      - currentTimePosixSeconds
      - maxNonPlutusTxFee
      properties:
        headId:
          type: string
        headAddress:
          type: string
        multisigRegimeUtxo:
          $ref: '#/components/schemas/TxInputView'
        treasuryBeaconToken:
          type: string
        submissionDurationSeconds:
          type: integer
          format: int64
        absorptionStartOffsetSeconds:
          type: integer
          format: int64
        refundStartOffsetSeconds:
          type: integer
          format: int64
        currentTimePosixSeconds:
          type: integer
          format: int64
        maxNonPlutusTxFee:
          type: string
    HealthResponse:
      title: HealthResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    PeerRequestSummaryView:
      title: PeerRequestSummaryView
      type: object
      required:
      - requestNumber
      - requestType
      properties:
        requestNumber:
          type: integer
          format: int64
        requestType:
          type: string
    ReadinessResponse:
      title: ReadinessResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    RequestAcceptedResponse:
      title: RequestAcceptedResponse
      type: object
      required:
      - requestId
      properties:
        requestId:
          type: integer
          format: int64
    RequestDetailsView:
      title: RequestDetailsView
      type: object
      required:
      - requestId
      - requestType
      - receivedAt
      - status
      properties:
        requestId:
          $ref: '#/components/schemas/RequestIdView'
        requestType:
          type: string
        receivedAt:
          type: string
        status:
          $ref: '#/components/schemas/RequestStatusView'
    RequestIdView:
      title: RequestIdView
      type: object
      required:
      - headPeerNumber
      - requestNumber
      properties:
        headPeerNumber:
          type: integer
          format: int32
        requestNumber:
          type: integer
          format: int64
    RequestStatusView:
      title: RequestStatusView
      type: object
      required:
      - status
      properties:
        status:
          type: string
        blockNumber:
          type: integer
          format: int32
        validity:
          type: string
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        relatedEffects:
          type: array
          items:
            type: integer
            format: int32
    RequestSummaryView:
      title: RequestSummaryView
      type: object
      required:
      - requestId
      - requestType
      properties:
        requestId:
          $ref: '#/components/schemas/RequestIdView'
        requestType:
          type: string
    TxInputView:
      title: TxInputView
      type: object
      required:
      - transaction_id
      - index
      properties:
        transaction_id:
          type: string
        index:
          type: integer
          format: int32
  securitySchemes:
    httpAuth:
      type: http
      scheme: basic
