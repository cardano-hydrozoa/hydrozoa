openapi: 3.1.0
info:
  title: Hydrozoa node API
  version: 0.1.0
paths:
  /head/requests:
    get:
      description: Requests the head has assigned an id — opaque request id, author
        peer number, and type (transaction or deposit). Filter with ?type=transaction|deposit
        and ?peer_number=<n>.
      operationId: getHeadRequests
      parameters:
      - name: type
        in: query
        required: false
        schema:
          type: string
      - name: peer_number
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      description: 'Submit a request. A root field tags the type: `{ "deposit": {
        "l1Payload", "l2Payload" } }` registers an L1 deposit (the unsigned deposit-tx
        CBOR plus the serialized L2 outputs it spawns on absorption); `{ "transaction":
        { "l2Payload" } }` submits an L2 transaction (a native, self-authenticating
        Cardano tx). Returns the assigned request id.'
      operationId: postHeadRequest
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/info:
    get:
      description: Head parameters plus the current node time.
      operationId: getHeadInfo
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadInfoResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/requests/{request-id}:
    get:
      description: 'One request''s peer, type, receive time, and lifecycle status:
        UNPROCESSED, PROPOSED (block + validity), SOFT_CONFIRMED (+ soft-confirmation
        time), or HARD_CONFIRMED (+ hard-confirmation time and the related L1 effects
        — the l1TxIds the request became). Every time records a local event at this
        peer — when it received the request, and when it produced the soft/hard confirmation
        — so different peers report different times for the same request. This is
        by design.'
      operationId: getHeadRequest
      parameters:
      - name: request-id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetailsView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks:
    get:
      description: Every block of the head in block order — number, fast-cycle leader,
        and type. Block 0 is the head's initial block (config, no leader).
      operationId: getHeadBlocks
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}:
    get:
      description: 'One block''s type, leader, and confirmation status: PROPOSED,
        SOFT (+ soft-confirmation time), or HARD (+ hard-confirmation time). Each
        confirmation time records a local event at this peer — when it produced the
        soft/hard confirmation — so different peers report different times for the
        same block. This is by design.'
      operationId: getHeadBlock
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetailsView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/body:
    get:
      description: 'The block''s content: its transactions (the request ids woven
        into the block, each with its validity verdict) and its deposit decisions
        (the request ids absorbed into the treasury and those rejected). 404 if the
        block does not exist.'
      operationId: getHeadBlockBody
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockBodyView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects:
    get:
      description: A block's L1 effects as l1TxIds, grouped by kind (initialization,
        settlement, fallback, sec, rollouts, refunds, finalization) per block type.
        Empty until the block is hard-confirmed.
      operationId: getHeadBlockEffects
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockEffectsView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/effects/{l1TxId}:
    get:
      description: Any effect by its l1TxId (real tx id, or an SEC's synthetic hash).
      operationId: getHeadEffect
      parameters:
      - name: l1TxId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/rollouts/{number}:
    get:
      description: One rollout of the block's rollout chain by index, or 404 if absent.
      operationId: getHeadBlockRollout
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      description: Liveness — always 200 while the process is serving HTTP.
      operationId: getHealth
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      description: Readiness — 200 only while the head is Active (open on L1); 503
        with the lifecycle status otherwise.
      operationId: getReady
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /api/admin/finalize:
    post:
      description: Trigger head finalization (admin only).
      operationId: postAdminFinalize
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        default:
          description: ''
          headers:
            WWW-Authenticate:
              required: false
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - {}
      - httpAuth: []
  /head/blocks/{block-number}/effects/initialization:
    get:
      description: The block's initialization effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_initialization
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/settlement:
    get:
      description: The block's settlement effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_settlement
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/fallback:
    get:
      description: The block's fallback effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_fallback
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/sec:
    get:
      description: The block's sec effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_sec
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/finalization:
    get:
      description: The block's finalization effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_finalization
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AbsorptionDecisionStatusView:
      title: AbsorptionDecisionStatusView
      oneOf:
      - $ref: '#/components/schemas/AbsorptionHardConfirmed'
      - $ref: '#/components/schemas/AbsorptionProposed'
      - $ref: '#/components/schemas/AbsorptionSoftConfirmed'
      - $ref: '#/components/schemas/AbsorptionUnprocessed'
      discriminator:
        propertyName: type
        mapping:
          HARD_CONFIRMED: '#/components/schemas/AbsorptionHardConfirmed'
          PROPOSED: '#/components/schemas/AbsorptionProposed'
          SOFT_CONFIRMED: '#/components/schemas/AbsorptionSoftConfirmed'
          UNPROCESSED: '#/components/schemas/AbsorptionUnprocessed'
    AbsorptionHardConfirmed:
      title: AbsorptionHardConfirmed
      type: object
      required:
      - blockNumber
      - decision
      - hardConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        settlementEffect:
          type: string
        type:
          type: string
          const: HARD_CONFIRMED
    AbsorptionProposed:
      title: AbsorptionProposed
      type: object
      required:
      - blockNumber
      - decision
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
        type:
          type: string
          const: PROPOSED
    AbsorptionSoftConfirmed:
      title: AbsorptionSoftConfirmed
      type: object
      required:
      - blockNumber
      - decision
      - softConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
        softConfirmedAt:
          type: string
        type:
          type: string
          const: SOFT_CONFIRMED
    AbsorptionUnprocessed:
      title: AbsorptionUnprocessed
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: UNPROCESSED
    BlockBodyView:
      title: BlockBodyView
      type: object
      required:
      - number
      - blockType
      properties:
        number:
          type: integer
          format: int32
        blockType:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/BlockRequestView'
        depositsAbsorbed:
          type: array
          items:
            type: integer
            format: int64
        depositsRejected:
          type: array
          items:
            type: integer
            format: int64
    BlockConfirmationView:
      title: BlockConfirmationView
      oneOf:
      - $ref: '#/components/schemas/BlockHardConfirmed'
      - $ref: '#/components/schemas/BlockProposed'
      - $ref: '#/components/schemas/BlockSoftConfirmed'
      discriminator:
        propertyName: type
        mapping:
          HARD_CONFIRMED: '#/components/schemas/BlockHardConfirmed'
          PROPOSED: '#/components/schemas/BlockProposed'
          SOFT_CONFIRMED: '#/components/schemas/BlockSoftConfirmed'
    BlockDetailsView:
      title: BlockDetailsView
      type: object
      required:
      - number
      - blockType
      - confirmation
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
        stackId:
          type: integer
          format: int32
        confirmation:
          $ref: '#/components/schemas/BlockConfirmationView'
        header:
          $ref: '#/components/schemas/BlockHeaderView'
    BlockEffectsView:
      title: BlockEffectsView
      type: object
      required:
      - blockType
      properties:
        blockType:
          type: string
        initialization:
          type: string
        settlement:
          type: string
        finalization:
          type: string
        fallback:
          type: string
        sec:
          type: string
        rollouts:
          type: array
          items:
            type: string
        refunds:
          type: array
          items:
            type: string
    BlockHardConfirmed:
      title: BlockHardConfirmed
      type: object
      required:
      - hardConfirmedAt
      - type
      properties:
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        type:
          type: string
          const: HARD_CONFIRMED
    BlockHeaderView:
      title: BlockHeaderView
      oneOf:
      - $ref: '#/components/schemas/Final'
      - $ref: '#/components/schemas/Initial'
      - $ref: '#/components/schemas/Major'
      - $ref: '#/components/schemas/Minor'
      discriminator:
        propertyName: type
        mapping:
          final: '#/components/schemas/Final'
          initial: '#/components/schemas/Initial'
          major: '#/components/schemas/Major'
          minor: '#/components/schemas/Minor'
    BlockProposed:
      title: BlockProposed
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: PROPOSED
    BlockRequestView:
      title: BlockRequestView
      type: object
      required:
      - requestId
      - validity
      properties:
        requestId:
          type: integer
          format: int64
        validity:
          type: string
    BlockSoftConfirmed:
      title: BlockSoftConfirmed
      type: object
      required:
      - softConfirmedAt
      - type
      properties:
        softConfirmedAt:
          type: string
        type:
          type: string
          const: SOFT_CONFIRMED
    BlockSummaryView:
      title: BlockSummaryView
      type: object
      required:
      - number
      - blockType
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
    Deposit:
      title: Deposit
      type: object
      required:
      - requestId
      - peerNumber
      - receivedAt
      - status
      - absorptionDecisionStatus
      - type
      properties:
        requestId:
          type: integer
          format: int64
        peerNumber:
          type: integer
          format: int32
        receivedAt:
          type: string
        status:
          $ref: '#/components/schemas/RequestStatusView'
        absorptionDecisionStatus:
          $ref: '#/components/schemas/AbsorptionDecisionStatusView'
        type:
          type: string
          const: deposit
    EffectRefView:
      title: EffectRefView
      type: object
      required:
      - l1TxId
      - kind
      properties:
        l1TxId:
          type: string
        kind:
          type: string
    EffectView:
      title: EffectView
      type: object
      required:
      - l1TxId
      - kind
      - blockNumber
      properties:
        l1TxId:
          type: string
        kind:
          type: string
        blockNumber:
          type: integer
          format: int32
        txCbor:
          type: string
        secOnchainSerialized:
          type: string
        headSignatures:
          type: array
          items:
            type: string
        coilSignatures:
          type: array
          items:
            type: string
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    Final:
      title: Final
      type: object
      required:
      - number
      - versionMajor
      - versionMinor
      - startTime
      - endTime
      - type
      properties:
        number:
          type: integer
          format: int32
        versionMajor:
          type: integer
          format: int32
        versionMinor:
          type: integer
          format: int32
        startTime:
          type: string
        endTime:
          type: string
        type:
          type: string
          const: final
    FinalizeResponse:
      title: FinalizeResponse
      type: object
      required:
      - status
      - message
      properties:
        status:
          type: string
        message:
          type: string
    HeadInfoResponse:
      title: HeadInfoResponse
      type: object
      required:
      - headId
      - headAddress
      - multisigRegimeUtxo
      - treasuryBeaconToken
      - submissionDurationSeconds
      - absorptionStartOffsetSeconds
      - refundStartOffsetSeconds
      - currentTimePosixSeconds
      - maxNonPlutusTxFee
      properties:
        headId:
          type: string
        headAddress:
          type: string
        multisigRegimeUtxo:
          $ref: '#/components/schemas/TxInputView'
        treasuryBeaconToken:
          type: string
        submissionDurationSeconds:
          type: integer
          format: int64
        absorptionStartOffsetSeconds:
          type: integer
          format: int64
        refundStartOffsetSeconds:
          type: integer
          format: int64
        currentTimePosixSeconds:
          type: integer
          format: int64
        maxNonPlutusTxFee:
          type: string
    HealthResponse:
      title: HealthResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    Initial:
      title: Initial
      type: object
      required:
      - number
      - versionMajor
      - versionMinor
      - startTime
      - endTime
      - fallbackTxStartTime
      - forcedMajorBlockWakeupTime
      - type
      properties:
        number:
          type: integer
          format: int32
        versionMajor:
          type: integer
          format: int32
        versionMinor:
          type: integer
          format: int32
        startTime:
          type: string
        endTime:
          type: string
        fallbackTxStartTime:
          type: string
        forcedMajorBlockWakeupTime:
          type: string
        depositDecisionWakeupTime:
          type: string
        type:
          type: string
          const: initial
    Major:
      title: Major
      type: object
      required:
      - number
      - versionMajor
      - versionMinor
      - startTime
      - endTime
      - fallbackTxStartTime
      - forcedMajorBlockWakeupTime
      - type
      properties:
        number:
          type: integer
          format: int32
        versionMajor:
          type: integer
          format: int32
        versionMinor:
          type: integer
          format: int32
        startTime:
          type: string
        endTime:
          type: string
        fallbackTxStartTime:
          type: string
        forcedMajorBlockWakeupTime:
          type: string
        depositDecisionWakeupTime:
          type: string
        type:
          type: string
          const: major
    Minor:
      title: Minor
      type: object
      required:
      - number
      - versionMajor
      - versionMinor
      - startTime
      - endTime
      - fallbackTxStartTime
      - forcedMajorBlockWakeupTime
      - type
      properties:
        number:
          type: integer
          format: int32
        versionMajor:
          type: integer
          format: int32
        versionMinor:
          type: integer
          format: int32
        startTime:
          type: string
        endTime:
          type: string
        fallbackTxStartTime:
          type: string
        forcedMajorBlockWakeupTime:
          type: string
        depositDecisionWakeupTime:
          type: string
        type:
          type: string
          const: minor
    ReadinessResponse:
      title: ReadinessResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    RequestAcceptedResponse:
      title: RequestAcceptedResponse
      type: object
      required:
      - requestId
      properties:
        requestId:
          type: integer
          format: int64
    RequestDetailsView:
      title: RequestDetailsView
      oneOf:
      - $ref: '#/components/schemas/Deposit'
      - $ref: '#/components/schemas/Transaction'
      discriminator:
        propertyName: type
        mapping:
          deposit: '#/components/schemas/Deposit'
          transaction: '#/components/schemas/Transaction'
    RequestHardConfirmed:
      title: RequestHardConfirmed
      type: object
      required:
      - blockNumber
      - validity
      - hardConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        validity:
          type: string
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        relatedEffects:
          type: array
          items:
            $ref: '#/components/schemas/EffectRefView'
        type:
          type: string
          const: HARD_CONFIRMED
    RequestProposed:
      title: RequestProposed
      type: object
      required:
      - blockNumber
      - validity
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        validity:
          type: string
        type:
          type: string
          const: PROPOSED
    RequestSoftConfirmed:
      title: RequestSoftConfirmed
      type: object
      required:
      - blockNumber
      - validity
      - softConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        validity:
          type: string
        softConfirmedAt:
          type: string
        type:
          type: string
          const: SOFT_CONFIRMED
    RequestStatusView:
      title: RequestStatusView
      oneOf:
      - $ref: '#/components/schemas/RequestHardConfirmed'
      - $ref: '#/components/schemas/RequestProposed'
      - $ref: '#/components/schemas/RequestSoftConfirmed'
      - $ref: '#/components/schemas/RequestUnprocessed'
      discriminator:
        propertyName: type
        mapping:
          HARD_CONFIRMED: '#/components/schemas/RequestHardConfirmed'
          PROPOSED: '#/components/schemas/RequestProposed'
          SOFT_CONFIRMED: '#/components/schemas/RequestSoftConfirmed'
          UNPROCESSED: '#/components/schemas/RequestUnprocessed'
    RequestSummaryView:
      title: RequestSummaryView
      type: object
      required:
      - requestId
      - peerNumber
      - requestType
      properties:
        requestId:
          type: integer
          format: int64
        peerNumber:
          type: integer
          format: int32
        requestType:
          type: string
    RequestUnprocessed:
      title: RequestUnprocessed
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: UNPROCESSED
    Transaction:
      title: Transaction
      type: object
      required:
      - requestId
      - peerNumber
      - receivedAt
      - status
      - type
      properties:
        requestId:
          type: integer
          format: int64
        peerNumber:
          type: integer
          format: int32
        receivedAt:
          type: string
        status:
