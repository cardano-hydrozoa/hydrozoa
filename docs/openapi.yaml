openapi: 3.1.0
info:
  title: Hydrozoa node API
  version: 0.1.0
paths:
  /head/requests:
    get:
      tags:
      - Requests
      description: Requests the head has assigned an id — opaque request id, author
        peer number, and type (transaction or deposit). Filter with ?type=transaction|deposit
        and ?peer_number=<n>.
      operationId: getHeadRequests
      parameters:
      - name: type
        in: query
        required: false
        schema:
          type: string
      - name: peer_number
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequestSummary'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Requests
      description: 'Submit a request. A `type` field tags the kind: `{ "type": "deposit",
        "l1Payload", "l2Payload" }` registers an L1 deposit (the unsigned deposit-tx
        CBOR plus the serialized L2 outputs it spawns on absorption); `{ "type": "transaction",
        "l2Payload" }` submits an L2 transaction (a native, self-authenticating Cardano
        tx). Payloads are lowercase hex. Returns the assigned request id.'
      operationId: postHeadRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRequest'
            examples:
              transaction:
                summary: Submit an L2 transaction
                value:
                  l2Payload: 84a400d9010281825820…
                  type: transaction
              deposit:
                summary: Register an L1 deposit
                value:
                  l1Payload: 84a400d9010281825820…
                  l2Payload: a1024568656164…
                  type: deposit
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestAcceptedResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/info:
    get:
      description: Head parameters plus the current node time.
      operationId: getHeadInfo
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeadInfoResponse'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/requests/{request-id}:
    get:
      tags:
      - Requests
      description: 'One request''s peer, type, receive time, and lifecycle status:
        UNPROCESSED, PROPOSED (block + validity), SOFT_CONFIRMED (+ soft-confirmation
        time), or HARD_CONFIRMED (+ hard-confirmation time and the related L1 effects
        — the l1TxIds the request became). Every time records a local event at this
        peer — when it received the request, and when it produced the soft/hard confirmation
        — so different peers report different times for the same request. This is
        by design.'
      operationId: getHeadRequest
      parameters:
      - name: request-id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetails'
              examples:
                transaction:
                  summary: A transaction request's details
                  value:
                    requestId: 5
                    peerNumber: 0
                    receivedAt: '2026-01-01T00:00:00Z'
                    status:
                      blockNumber: 12
                      validity: valid
                      softConfirmedAt: '2026-01-01T00:00:03Z'
                      hardConfirmedAt: '2026-01-01T00:02:00Z'
                      relatedEffects:
                      - l1TxId: 9f8e7d6c5b4a…
                        kind: settlement
                      type: HARD_CONFIRMED
                    type: transaction
                deposit:
                  summary: A deposit request's details
                  value:
                    requestId: 1099511627782
                    peerNumber: 1
                    receivedAt: '2026-01-01T00:00:00Z'
                    status:
                      blockNumber: 8
                      validity: valid
                      softConfirmedAt: '2026-01-01T00:00:04Z'
                      hardConfirmedAt: '2026-01-01T00:03:00Z'
                      relatedEffects:
                      - l1TxId: 1a2b3c4d5e6f…
                        kind: refund
                      type: HARD_CONFIRMED
                    absorptionDecisionStatus:
                      blockNumber: 10
                      decision: ABSORBED
                      softConfirmedAt: '2026-01-01T00:01:00Z'
                      hardConfirmedAt: '2026-01-01T00:04:00Z'
                      settlementEffect: 4d5e6f7a8b9c…
                      type: HARD_CONFIRMED
                    type: deposit
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks:
    get:
      tags:
      - Blocks
      description: Every block of the head in block order — number, fast-cycle leader,
        and type. Block 0 is the head's initial block (config, no leader).
      operationId: getHeadBlocks
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockSummary'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}:
    get:
      tags:
      - Blocks
      description: 'One block''s type, leader, hard-confirming stack, full header,
        and confirmation status: PROPOSED, SOFT_CONFIRMED (+ soft-confirmation time),
        or HARD_CONFIRMED (+ hard-confirmation time). Each confirmation time records
        a local event at this peer — when it produced the soft/hard confirmation —
        so different peers report different times for the same block. This is by design.'
      operationId: getHeadBlock
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetails'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/body:
    get:
      tags:
      - Blocks
      description: 'The block''s content: its transactions (the request ids woven
        into the block, each with its validity verdict) and its deposit decisions
        (the request ids absorbed into the treasury and those rejected). 404 if the
        block does not exist.'
      operationId: getHeadBlockBody
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockBody'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects:
    get:
      tags:
      - Blocks
      description: A block's L1 effects as l1TxIds, grouped by kind (initialization,
        settlement, fallback, sec, rollouts, refunds, finalization) per block type.
        Empty until the block is hard-confirmed.
      operationId: getHeadBlockEffects
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockEffects'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/effects/{l1TxId}:
    get:
      tags:
      - Effects
      description: Any effect by its l1TxId (real tx id, or an SEC's synthetic hash).
      operationId: getHeadEffect
      parameters:
      - name: l1TxId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Effect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/rollouts/{number}:
    get:
      tags:
      - Blocks
      description: One rollout of the block's rollout chain by index, or 404 if absent.
      operationId: getHeadBlockRollout
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /health:
    get:
      description: Liveness — always 200 while the process is serving HTTP.
      operationId: getHealth
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      description: Readiness — 200 only while the head is Active (open on L1); 503
        with the lifecycle status otherwise.
      operationId: getReady
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /version:
    get:
      description: The build identity (version, git commit, build time) baked in at
        compile.
      operationId: getVersion
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /api/admin/finalize:
    post:
      tags:
      - Governance
      description: Trigger head finalization (admin only).
      operationId: postAdminFinalize
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        default:
          description: ''
          headers:
            WWW-Authenticate:
              required: false
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - {}
      - httpAuth: []
  /head/blocks/{block-number}/effects/initialization:
    get:
      tags:
      - Blocks
      description: The block's initialization effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_initialization
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/settlement:
    get:
      tags:
      - Blocks
      description: The block's settlement effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_settlement
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/fallback:
    get:
      tags:
      - Blocks
      description: The block's fallback effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_fallback
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/finalization:
    get:
      tags:
      - Blocks
      description: The block's finalization effect in full, or 404 if it has none.
      operationId: getHeadBlockEffect_finalization
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /head/blocks/{block-number}/effects/sec:
    get:
      tags:
      - Blocks
      description: The block's SEC (standalone evacuation commitment), or 404 if it
        has none.
      operationId: getHeadBlockEffect_sec
      parameters:
      - name: block-number
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecEffect'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AbsorptionDecisionStatus:
      title: AbsorptionDecisionStatus
      oneOf:
      - $ref: '#/components/schemas/AbsorptionHardConfirmed'
      - $ref: '#/components/schemas/AbsorptionProposed'
      - $ref: '#/components/schemas/AbsorptionSoftConfirmed'
      - $ref: '#/components/schemas/AbsorptionUnprocessed'
      discriminator:
        propertyName: type
        mapping:
          HARD_CONFIRMED: '#/components/schemas/AbsorptionHardConfirmed'
          PROPOSED: '#/components/schemas/AbsorptionProposed'
          SOFT_CONFIRMED: '#/components/schemas/AbsorptionSoftConfirmed'
          UNPROCESSED: '#/components/schemas/AbsorptionUnprocessed'
    AbsorptionHardConfirmed:
      title: AbsorptionHardConfirmed
      type: object
      required:
      - blockNumber
      - decision
      - hardConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
          enum:
          - ABSORBED
          - REJECTED
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        settlementEffect:
          type: string
        type:
          type: string
          const: HARD_CONFIRMED
    AbsorptionProposed:
      title: AbsorptionProposed
      type: object
      required:
      - blockNumber
      - decision
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
          enum:
          - ABSORBED
          - REJECTED
        type:
          type: string
          const: PROPOSED
    AbsorptionSoftConfirmed:
      title: AbsorptionSoftConfirmed
      type: object
      required:
      - blockNumber
      - decision
      - softConfirmedAt
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        decision:
          type: string
          enum:
          - ABSORBED
          - REJECTED
        softConfirmedAt:
          type: string
        type:
          type: string
          const: SOFT_CONFIRMED
    AbsorptionUnprocessed:
      title: AbsorptionUnprocessed
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: UNPROCESSED
    BlockBody:
      title: BlockBody
      type: object
      required:
      - number
      - blockType
      properties:
        number:
          type: integer
          format: int32
        blockType:
          type: string
          enum:
          - initial
          - minor
          - major
          - final
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/BlockRequest'
        depositsAbsorbed:
          type: array
          items:
            type: integer
            format: int64
        depositsRejected:
          type: array
          items:
            type: integer
            format: int64
    BlockConfirmation:
      title: BlockConfirmation
      oneOf:
      - $ref: '#/components/schemas/BlockHardConfirmed'
      - $ref: '#/components/schemas/BlockProposed'
      - $ref: '#/components/schemas/BlockSoftConfirmed'
      discriminator:
        propertyName: type
        mapping:
          HARD_CONFIRMED: '#/components/schemas/BlockHardConfirmed'
          PROPOSED: '#/components/schemas/BlockProposed'
          SOFT_CONFIRMED: '#/components/schemas/BlockSoftConfirmed'
    BlockDetails:
      title: BlockDetails
      type: object
      required:
      - number
      - blockType
      - status
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
          enum:
          - initial
          - minor
          - major
          - final
        stackId:
          type: integer
          format: int32
        status:
          $ref: '#/components/schemas/BlockConfirmation'
        header:
          $ref: '#/components/schemas/BlockHeader'
    BlockEffects:
      title: BlockEffects
      oneOf:
      - $ref: '#/components/schemas/BlockEffectsFinal'
      - $ref: '#/components/schemas/BlockEffectsInitial'
      - $ref: '#/components/schemas/BlockEffectsMajor'
      - $ref: '#/components/schemas/BlockEffectsMinor'
      discriminator:
        propertyName: type
        mapping:
          final: '#/components/schemas/BlockEffectsFinal'
          initial: '#/components/schemas/BlockEffectsInitial'
          major: '#/components/schemas/BlockEffectsMajor'
          minor: '#/components/schemas/BlockEffectsMinor'
    BlockEffectsFinal:
      title: BlockEffectsFinal
      type: object
      required:
      - finalization
      - type
      properties:
        finalization:
          type: string
        rollouts:
          type: array
          items:
            type: string
        type:
          type: string
          const: final
    BlockEffectsInitial:
      title: BlockEffectsInitial
      type: object
      required:
      - initialization
      - fallback
      - type
      properties:
        initialization:
          type: string
        fallback:
          type: string
        type:
          type: string
          const: initial
    BlockEffectsMajor:
      title: BlockEffectsMajor
      type: object
      required:
      - settlement
      - fallback
      - type
      properties:
        settlement:
          type: string
        fallback:
          type: string
        rollouts:
          type: array
          items:
            type: string
        refunds:
          type: array
          items:
            type: string
        type:
          type: string
          const: major
    BlockEffectsMinor:
      title: BlockEffectsMinor
      type: object
      required:
      - type
      properties:
        sec:
          type: string
        refunds:
          type: array
          items:
            type: string
        type:
          type: string
          const: minor
    BlockHardConfirmed:
      title: BlockHardConfirmed
      type: object
      required:
      - hardConfirmedAt
      - type
      properties:
        softConfirmedAt:
          type: string
        hardConfirmedAt:
          type: string
        type:
          type: string
          const: HARD_CONFIRMED
    BlockHeader:
      title: BlockHeader
      oneOf:
      - $ref: '#/components/schemas/Final'
      - $ref: '#/components/schemas/Initial'
      - $ref: '#/components/schemas/Major'
      - $ref: '#/components/schemas/Minor'
      discriminator:
        propertyName: type
        mapping:
          final: '#/components/schemas/Final'
          initial: '#/components/schemas/Initial'
          major: '#/components/schemas/Major'
          minor: '#/components/schemas/Minor'
    BlockProposed:
      title: BlockProposed
      type: object
      required:
      - type
      properties:
        type:
          type: string
          const: PROPOSED
    BlockRequest:
      title: BlockRequest
      type: object
      required:
      - requestId
      - validity
      properties:
        requestId:
          type: integer
          format: int64
        validity:
          type: string
          enum:
          - valid
          - invalid
    BlockSoftConfirmed:
      title: BlockSoftConfirmed
      type: object
      required:
      - type
      properties:
        softConfirmedAt:
          type: string
        type:
          type: string
          const: SOFT_CONFIRMED
    BlockSummary:
      title: BlockSummary
      type: object
      required:
      - number
      - blockType
      properties:
        number:
          type: integer
          format: int32
        leader:
          type: integer
          format: int32
        blockType:
          type: string
          enum:
          - initial
          - minor
          - major
          - final
    Deposit:
      title: Deposit
      type: object
      required:
      - requestId
      - peerNumber
      - receivedAt
      - status
      - absorptionDecisionStatus
      - type
      properties:
        requestId:
          type: integer
          format: int64
        peerNumber:
          type: integer
          format: int32
        receivedAt:
          type: string
        status:
          $ref: '#/components/schemas/RequestStatus'
        absorptionDecisionStatus:
          $ref: '#/components/schemas/AbsorptionDecisionStatus'
        type:
          type: string
          const: deposit
    Effect:
      title: Effect
      oneOf:
      - $ref: '#/components/schemas/Fallback'
      - $ref: '#/components/schemas/Finalization'
      - $ref: '#/components/schemas/Initialization'
      - $ref: '#/components/schemas/Refund'
      - $ref: '#/components/schemas/Rollout'
      - $ref: '#/components/schemas/Sec'
      - $ref: '#/components/schemas/Settlement'
      discriminator:
        propertyName: type
        mapping:
          fallback: '#/components/schemas/Fallback'
          finalization: '#/components/schemas/Finalization'
          initialization: '#/components/schemas/Initialization'
          refund: '#/components/schemas/Refund'
          rollout: '#/components/schemas/Rollout'
          sec: '#/components/schemas/Sec'
          settlement: '#/components/schemas/Settlement'
    EffectRef:
      title: EffectRef
      type: object
      required:
      - l1TxId
      - kind
      properties:
        l1TxId:
          type: string
        kind:
          type: string
          enum:
          - initialization
          - settlement
          - fallback
          - rollout
          - finalization
          - refund
          - sec
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    Fallback:
      title: Fallback
      type: object
      required:
      - blockNumber
      - txCbor
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        txCbor:
          type: string
        type:
          type: string
          const: fallback
    Final:
      title: Final
      type: object
      required:
      - number
      - versionMajor
      - versionMinor
      - startTime
      - endTime
      - type
      properties:
        number:
          type: integer
          format: int32
        versionMajor:
          type: integer
          format: int32
        versionMinor:
          type: integer
          format: int32
        startTime:
          type: string
        endTime:
          type: string
        type:
          type: string
          const: final
    Finalization:
      title: Finalization
      type: object
      required:
      - blockNumber
      - txCbor
      - type
      properties:
        blockNumber:
          type: integer
          format: int32
        txCbor:
          type: string
        type:
          type: string
          const: finalization
    FinalizeResponse:
      title: FinalizeResponse
      type: object
      required:
      - status
      - message
      properties:
        status:
          type: string
        message:
          type: string
    HeadInfoResponse:
      title: HeadInfoResponse
      type: object
      required:
      - headId
      - headAddress
      - multisigRegimeUtxo
      - treasuryBeaconToken
      - submissionDurationSeconds
      - absorptionStartOffsetSeconds
      - refundStartOffsetSeconds
      - currentTimePosixSeconds
      - maxNonPlutusTxFee
      properties:
        headId:
          type: string
        headAddress:
          type: string
        multisigRegimeUtxo:
          $ref: '#/components/schemas/TxInput'
        treasuryBeaconToken:
          type: string
        submissionDurationSeconds:
          type: integer
          format: int64
        absorptionStartOffsetSeconds:
          type: integer
          format: int64
        refundStartOffsetSeconds:
          type: integer
          format: int64
        currentTimePosixSeconds:
          type: integer
          format: int64
        maxNonPlutusTxFee:
          type: string
    HealthResponse:
      title: HealthResponse
      type: object
      required:
      - status
      properties:
        status:
          type: string
    Initial:
      title: Initial
      type: object
      required:
      - number
