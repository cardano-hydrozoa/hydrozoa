openapi: 3.1.0
info:
  title: Hydrozoa EUTXO L2 ledger API
  version: 0.1.0
paths:
  /api/l2/utxos/{address}:
    get:
      description: Current L2 utxos controlled by a bech32 address (EUTXO ledger only).
      operationId: getApiL2UtxosAddress
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2UtxoView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/l2/transactions:
    get:
      description: Recent applied L2 transactions, newest first (EUTXO ledger only).
      operationId: getApiL2Transactions
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2TxSummaryView'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    DatumView:
      title: DatumView
      type: object
      properties:
        inline:
          type: string
        hash:
          type: string
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    L2OutputView:
      title: L2OutputView
      type: object
      required:
      - address
      - value
      properties:
        address:
          type: string
        value:
          $ref: '#/components/schemas/ValueView'
        datum:
          $ref: '#/components/schemas/DatumView'
    L2TxSummaryView:
      title: L2TxSummaryView
      type: object
      required:
      - requestId
      - blockNumber
      - kind
      properties:
        requestId:
          $ref: '#/components/schemas/RequestIdView'
        blockNumber:
          type: integer
          format: int32
        kind:
          type: string
    L2UtxoView:
      title: L2UtxoView
      type: object
      required:
      - input
      - output
      properties:
        input:
          $ref: '#/components/schemas/TxInputView'
        output:
          $ref: '#/components/schemas/L2OutputView'
    Map_Map_String_String:
      title: Map_Map_String_String
      type: object
      additionalProperties:
        $ref: '#/components/schemas/Map_String'
    Map_String:
      title: Map_String
      type: object
      additionalProperties:
        type: string
    RequestIdView:
      title: RequestIdView
      type: object
      required:
      - headPeerNumber
      - requestNumber
      properties:
        headPeerNumber:
          type: integer
          format: int32
        requestNumber:
          type: integer
          format: int64
    TxInputView:
      title: TxInputView
      type: object
      required:
      - transaction_id
      - index
      properties:
        transaction_id:
          type: string
        index:
          type: integer
          format: int32
    ValueView:
      title: ValueView
      type: object
      required:
      - coin
      - assets
      properties:
        coin:
          type: string
        assets:
          $ref: '#/components/schemas/Map_Map_String_String'
