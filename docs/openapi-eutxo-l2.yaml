openapi: 3.1.0
info:
  title: Hydrozoa EUTXO L2 ledger API
  version: 0.1.0
paths:
  /l2/cardano-eutxo/utxos/{address}:
    get:
      description: Current L2 utxos controlled by a bech32 address (EUTXO ledger only).
      operationId: getL2CardanoEutxoUtxos
      parameters:
      - name: address
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2Utxo'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /l2/cardano-eutxo/transactions:
    get:
      description: Recent applied L2 transactions, newest first (EUTXO ledger only).
      operationId: getL2CardanoEutxoTransactions
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/L2TxSummary'
        default:
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    Datum:
      title: Datum
      type: object
      properties:
        inline:
          type: string
        hash:
          type: string
    ErrorResponse:
      title: ErrorResponse
      type: object
      required:
      - error
      properties:
        error:
          type: string
    L2Output:
      title: L2Output
      type: object
      required:
      - address
      - value
      properties:
        address:
          type: string
        value:
          $ref: '#/components/schemas/Value'
        datum:
          $ref: '#/components/schemas/Datum'
    L2TxSummary:
      title: L2TxSummary
      type: object
      required:
      - requestId
      - blockNumber
      - kind
      properties:
        requestId:
          $ref: '#/components/schemas/RequestId'
        blockNumber:
          type: integer
          format: int32
        kind:
          type: string
          enum:
          - transaction
          - depositRegistered
          - depositAbsorbed
          - depositRejected
    L2Utxo:
      title: L2Utxo
      type: object
      required:
      - input
      - output
      properties:
        input:
          $ref: '#/components/schemas/TxInput'
        output:
          $ref: '#/components/schemas/L2Output'
    Map_Map_String_String:
      title: Map_Map_String_String
      type: object
      additionalProperties:
        $ref: '#/components/schemas/Map_String'
    Map_String:
      title: Map_String
      type: object
      additionalProperties:
        type: string
    RequestId:
      title: RequestId
      type: object
      required:
      - headPeerNumber
      - requestNumber
      properties:
        headPeerNumber:
          type: integer
          format: int32
        requestNumber:
          type: integer
          format: int64
    TxInput:
      title: TxInput
      type: object
      required:
      - transaction_id
      - index
      properties:
        transaction_id:
          type: string
        index:
          type: integer
          format: int32
    Value:
      title: Value
      type: object
      required:
      - coin
      - assets
      properties:
        coin:
          type: string
        assets:
          $ref: '#/components/schemas/Map_Map_String_String'
