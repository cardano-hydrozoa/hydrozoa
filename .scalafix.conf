rules = [
  ExplicitResultTypes
  OrganizeImports
  LeakingImplicitClassVal
  NoValInForComprehension
  ProcedureSyntax
  RedundantSyntax
]

ExplicitResultTypes {
  # Scalafix's ExplicitResultTypes presentation compiler is built for a different Scala 3
  # patch (3.3.8 in sbt-scalafix 0.14.7) than the project's 3.3.7; fetch the matching
  # compiler artifacts so the scalus compiler plugin loads into it without crashing
  # (otherwise: `key not found: posttyper` during plugin phase scheduling).
  fetchScala3CompilerArtifactsOnVersionMismatch = true
}

OrganizeImports {
  groupedImports = Merge
  groups = [
    "hydrozoa.*"
    "scalus.*"
    "com.suprnation.*"
    "cats.*"
    "scala.*"
    "*"
  ]
  removeUnused = true
  importSelectorsOrder = Ascii
  importsOrder = Ascii
  preset = DEFAULT
  targetDialect = Scala3
}
