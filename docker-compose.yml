# A multi-peer Hydrozoa head: 2 head peers + 4 coil peers, each a single hydrozoa node running the
# built-in EUTXO L2 ledger in-process — no ledger sidecar, no external database. Every node mounts
# the shared head-config.json plus its own private.json; head peers publish their user/admin HTTP
# API, coil peers dial out only. See DEPLOYMENT.md §6.
#
# Because the ledger is in-process, each service is one full container with a single mesh interface,
# so hydrozoa's mesh WS server binds cleanly to its own service name (bind == dialed address,
# ws://head-N:4001; Main.scala) and coil peers dial their hub's /hub route over the mesh.
#
# Bring-up (in the hydrozoa repo, inside `nix develop`):
#   1. just keygen-fleet 2 4 2     (then fund head-0, build-bootstrap, build-head-config — §5)
#   2. sbt docker:publishLocal
#   3. docker compose up -d
#
# HYDROZOA_CONFIG overrides where the generated configs are read from (default ./config/demo);
# HYDROZOA_IMAGE overrides the hydrozoa image.

name: hydrozoa

networks:
  mesh:
    driver_opts:
      # Rootless docker (slirp4netns) can drop outbound TLS to Blockfrost at the default MTU.
      com.docker.network.driver.mtu: 1400

x-hydrozoa: &hydrozoa
  image: ${HYDROZOA_IMAGE:-cardano-hydrozoa/hydrozoa:0.1.0-SNAPSHOT}
  # root: the image's non-root user cannot write the RocksDB stores / logs under the /opt/docker
  # workdir. State is ephemeral here (no volumes) — restarting re-initializes a fresh head (§5b).
  user: root
  environment:
    JAVA_OPTS: -Xmx1g -Xms256m
  command: ["/configs/head-config.json", "/configs/private.json"]
  networks: [mesh]
  # Upstream resolver so the node can reach Blockfrost; the embedded DNS still resolves the
  # mesh service names (head-0, head-1, …) for the inter-peer WS mesh.
  dns:
    - 8.8.8.8
    - 8.8.4.4
  stop_grace_period: 120s
  restart: on-failure

services:
  ## ---------------------------------------------------------- head peers (publish the HTTP API)

  head-0:
    <<: *hydrozoa
    ports:
      - "8080:8080"   # hydrozoa-head-0 user/admin HTTP API
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/head-0/private.json:/configs/private.json:ro

  head-1:
    <<: *hydrozoa
    ports:
      - "8081:8080"   # hydrozoa-head-1 user/admin HTTP API
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/head-1/private.json:/configs/private.json:ro

  ## ---------------------------------------------------------- coil peers (dial out only)

  coil-0:
    <<: *hydrozoa
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/coil-0/private.json:/configs/private.json:ro

  coil-1:
    <<: *hydrozoa
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/coil-1/private.json:/configs/private.json:ro

  coil-2:
    <<: *hydrozoa
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/coil-2/private.json:/configs/private.json:ro

  coil-3:
    <<: *hydrozoa
    volumes:
      - ${HYDROZOA_CONFIG:-./config/demo}/head-config/head-config.json:/configs/head-config.json:ro
      - ${HYDROZOA_CONFIG:-./config/demo}/private/coil-3/private.json:/configs/private.json:ro
